<!-- Global styles -->
<style>
  :host {
    --sage-green: #7E8C69;
    --light-sage: #9CAD8C;
    --dusty-pink: #F6B0BB;
    --light-pink: #F1C8CB;
    --white: #ffffff;
    --black: #1a1a1a;
    
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scroll-behavior: smooth;
    overscroll-behavior-y: none; /* Prevents bounce effect on some browsers */
    -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
  }

  html {
    scroll-behavior: smooth;
    scroll-padding-top: 80px; /* Account for fixed header */
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    will-change: scroll-position; /* Optimize scrolling performance */
  }

  body {
    height: 100%;
    overflow-x: hidden;
    position: relative;
    background: linear-gradient(135deg, var(--white) 0%, var(--light-pink) 100%);
    /* Add hardware acceleration for smoother animations */
    transform: translateZ(0);
    backface-visibility: hidden;
    perspective: 1000;
  }

  /* Smooth scroll for all sections */
  section {
    scroll-margin-top: 80px;
    transform: translateZ(0);
    backface-visibility: hidden;
    will-change: transform;
  }

  /* Optimize animations */
  * {
    animation-duration: 0.3s !important;
    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1) !important;
  }

  .portfolio-container {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--white) 0%, var(--light-pink) 100%);
    position: relative;
    overflow-x: hidden;
    transform: translateZ(0);
    backface-visibility: hidden;
    will-change: transform;
  }

  .main-content {
    padding-top: 80px; /* Account for fixed nav */
    position: relative;
    z-index: 1;
  }

  @media (max-width: 768px) {
    section {
      padding: 2rem 1rem;
    }
  }
</style>

<!-- Skip to content link for accessibility -->
<a href="#main-content" class="skip-to-content">Skip to main content</a>

<div class="portfolio-container">
  <app-header></app-header>

  <main id="main-content" class="main-content" role="main" aria-label="Main content">
    <app-hero></app-hero>
    <app-about></app-about>
    <app-projects></app-projects>
   <app-skills></app-skills>
    <app-contact></app-contact>
  </main>
</div>

<router-outlet />
