<section id="skills" class="skills-section">
  <!-- Decorative elements -->
  <div class="skills-decoration decoration-1"></div>
  <div class="skills-decoration decoration-2"></div>

  <div class="skills-container">
    <div class="skills-header">
      <h2 class="section-title">Skills & Expertise</h2>
      <div class="title-decoration"></div>
      <p class="section-subtitle">Technologies and tools I work with</p>
    </div>

    <!-- Skills Categories -->
    <div class="skills-categories">
      <!-- Frontend Development -->
      <div class="skill-category">
        <div class="category-header">
          <i class="fas fa-code"></i>
          <h3>Frontend Development</h3>
        </div>
        <div class="skills-grid">
          <div class="skill-card" *ngFor="let skill of frontendSkills">
            <div class="skill-info">
              <span class="skill-name">{{skill.name}}</span>
              <span class="skill-level">{{skill.level}}%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" [style.width.%]="skill.level"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Backend Development -->
      <div class="skill-category">
        <div class="category-header">
          <i class="fas fa-server"></i>
          <h3>Backend Development</h3>
        </div>
        <div class="skills-grid">
          <div class="skill-card" *ngFor="let skill of backendSkills">
            <div class="skill-info">
              <span class="skill-name">{{skill.name}}</span>
              <span class="skill-level">{{skill.level}}%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" [style.width.%]="skill.level"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tools & Others -->
      <div class="skill-category">
        <div class="category-header">
          <i class="fas fa-tools"></i>
          <h3>Tools & Others</h3>
        </div>
        <div class="skills-grid">
          <div class="skill-card" *ngFor="let skill of otherSkills">
            <div class="skill-info">
              <span class="skill-name">{{skill.name}}</span>
              <span class="skill-level">{{skill.level}}%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" [style.width.%]="skill.level"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Additional Skills -->
    <div class="additional-skills">
      <h3>Additional Skills</h3>
      <div class="skills-tags">
        <span class="skill-tag" *ngFor="let skill of additionalSkills">{{skill}}</span>
      </div>
    </div>
  </div>
</section>
